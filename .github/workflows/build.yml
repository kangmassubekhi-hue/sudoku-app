import random
from kivy.app import App
from kivy.clock import Clock
from kivy.uix.anchorlayout import AnchorLayout
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.gridlayout import GridLayout
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.uix.popup import Popup

# ---------------------------------------------------------------------------
# LOGIKA SUDOKU (murni Python, tidak tergantung Kivy)
# ---------------------------------------------------------------------------

def generate_full_board():
    """Bikin papan 9x9 yang terisi penuh dan valid."""
    board = [[0] * 9 for _ in range(9)]
    # Isi 3 kotak diagonal dulu (saling independen, mempercepat proses)
    for i in range(0, 9, 3):
        _fill_box(board, i, i)
    _solve(board)
    return board


def _fill_box(board, row, col):
    nums = list(range(1, 10))
    random.shuffle(nums)
    idx = 0
    for r in range(row, row + 3):
        for c in range(col, col + 3):
            board[r][c] = nums[idx]
            idx += 1


def is_valid(board, row, col, num):
    if num in board[row]:
        return False
    if num in [board[r][col] for r in range(9)]:
        return False
    box_row, box_col = 3 * (row // 3), 3 * (col // 3)
    for r in range(box_row, box_row + 3):
        for c in range(box_col, box_col + 3):
            if board[r][c] == num:
                return False
    return True


def _find_empty(board):
    for r in range(9):
        for c in range(9):
            if board[r][c] == 0:
                return r, c
    return None


def _solve(board):
    empty = _find_empty(board)
    if not empty:
        return True
    row, col = empty
    nums = list(range(1, 10))
    random.shuffle(nums)
    for num in nums:
        if is_valid(board, row, col, num):
            board[row][col] = num
            if _solve(board):
                return True
            board[row][col] = 0
    return False


def count_solutions(board, limit=2):
    """Hitung jumlah solusi (berhenti begitu mencapai limit, biar cepat)."""
    board = [row[:] for row in board]
    count = [0]

    def backtrack():
        if count[0] >= limit:
            return
        empty = _find_empty(board)
        if not empty:
            count[0] += 1
            return
        row, col = empty
        for num in range(1, 10):
            if is_valid(board, row, col, num):
                board[row][col] = num
                backtrack()
                board[row][col] = 0
                if count[0] >= limit:
                    return

    backtrack()
    return count[0]


DIFFICULTY_REMOVE = {"easy": 40, "medium": 46, "hard": 52}


def make_puzzle(solved_board, difficulty="medium"):
    """Hapus sel dari papan penuh, sambil menjamin solusinya tetap unik."""
    puzzle = [row[:] for row in solved_board]
    target_remove = DIFFICULTY_REMOVE.get(difficulty, 46)

    positions = [(r, c) for r in range(9) for c in range(9)]
    random.shuffle(positions)

    removed = 0
    for r, c in positions:
        if removed >= target_remove:
            break
        backup = puzzle[r][c]
        puzzle[r][c] = 0
        if count_solutions(puzzle) != 1:
            puzzle[r][c] = backup  # batal, kembalikan sel ini
        else:
            removed += 1
    return puzzle


def is_board_valid_and_complete(board):
    for i in range(9):
        row = board[i]
        col = [board[r][i] for r in range(9)]
        if set(row) != set(range(1, 10)) or set(col) != set(range(1, 10)):
            return False
    for br in range(0, 9, 3):
        for bc in range(0, 9, 3):
            box = [board[r][c] for r in range(br, br + 3) for c in range(bc, bc + 3)]
            if set(box) != set(range(1, 10)):
                return False
    return True


def get_conflicts(board):
    """Kembalikan set (row, col) sel yang bentrok dengan sel lain di baris/kolom/kotak."""
    conflicts = set()
    for i in range(9):
        seen = {}
        for c in range(9):
            v = board[i][c]
            if v == 0:
                continue
            if v in seen:
                conflicts.add((i, c))
                conflicts.add((i, seen[v]))
            else:
                seen[v] = c
        seen = {}
        for r in range(9):
            v = board[r][i]
            if v == 0:
                continue
            if v in seen:
                conflicts.add((r, i))
                conflicts.add((seen[v], i))
            else:
                seen[v] = r
    for br in range(0, 9, 3):
        for bc in range(0, 9, 3):
            seen = {}
            for r in range(br, br + 3):
                for c in range(bc, bc + 3):
                    v = board[r][c]
                    if v == 0:
                        continue
                    if v in seen:
                        conflicts.add((r, c))
                        conflicts.add(seen[v])
                    else:
                        seen[v] = (r, c)
    return conflicts


# ---------------------------------------------------------------------------
# UI KIVY
# ---------------------------------------------------------------------------

class Cell(Button):
    """Satu kotak Sudoku. Semua state visual diatur lewat refresh_visual()
    supaya tidak saling menimpa antara status selected/given/conflict."""

    def __init__(self, row, col, on_select, **kwargs):
        super().__init__(**kwargs)
        self.row = row
        self.col = col
        self.on_select_callback = on_select
        self.is_given = False
        self.is_selected = False
        self.is_conflict = False
        self.font_size = "20sp"
        self.background_normal = ""
        self.background_down = ""
        self.refresh_visual()

    def on_release(self):
        self.on_select_callback(self.row, self.col)

    def set_value(self, val):
        self.text = str(val) if val != 0 else ""

    def set_state(self, is_given=None, is_selected=None, is_conflict=None):
        if is_given is not None:
            self.is_given = is_given
        if is_selected is not None:
            self.is_selected = is_selected
        if is_conflict is not None:
            self.is_conflict = is_conflict
        self.refresh_visual()

    def refresh_visual(self):
        if self.is_selected:
            self.background_color = (0.68, 0.85, 1, 1)
        elif self.is_given:
            self.background_color = (0.88, 0.88, 0.92, 1)
        else:
            self.background_color = (1, 1, 1, 1)

        if self.is_conflict:
            self.color = (0.85, 0.15, 0.15, 1)
        elif self.is_given:
            self.color = (0.15, 0.15, 0.55, 1)
        else:
            self.color = (0.15, 0.15, 0.15, 1)

        self.bold = self.is_given


class SudokuGame(BoxLayout):
    def __init__(self, **kwargs):
        kwargs["orientation"] = "vertical"
        kwargs.setdefault("padding", 8)
        kwargs.setdefault("spacing", 6)
        # Size to fit its own content instead of stretching to fill the
        # parent's full height. Combined with the AnchorLayout wrapper in
        # SudokuApp.build(), this keeps the game docked at the TOP of the
        # screen so any leftover space (from tall phone aspect ratios) ends
        # up below the "Game Baru" button instead of as a gap up top.
        kwargs["size_hint_y"] = None
        super().__init__(**kwargs)
        self.bind(minimum_height=self.setter("height"))

        self.solved_board = None
        self.puzzle_board = None
        self.given_mask = None
        self.cells = {}
        self.selected_cell = None
        self.difficulty = "medium"
        self.popup = None
        self.timer_event = None
        self.elapsed_seconds = 0

        self._build_ui()
        self.new_game(self.difficulty)

    # -- UI construction -----------------------------------------------

    def _build_ui(self):
        header = BoxLayout(size_hint=(1, None), height="36dp")
        header.add_widget(
            Label(text="SUDOKU", font_size="22sp", bold=True, color=(0.15, 0.15, 0.4, 1))
        )
        self.timer_label = Label(
            text="00:00",
            font_size="18sp",
            size_hint=(None, 1),
            width="70dp",
            color=(0.15, 0.15, 0.4, 1),
        )
        header.add_widget(self.timer_label)
        self.add_widget(header)

        self.status_label = Label(
            text="", size_hint=(1, None), height="26dp", font_size="15sp"
        )
        self.add_widget(self.status_label)

        self.grid_container = GridLayout(
            cols=3, rows=3, spacing=4, size_hint=(1, None)
        )
        self.grid_container.bind(width=self._sync_grid_height)

        for br in range(3):
            for bc in range(3):
                box = GridLayout(cols=3, rows=3, spacing=1)
                for r in range(br * 3, br * 3 + 3):
                    for c in range(bc * 3, bc * 3 + 3):
                        cell = Cell(row=r, col=c, on_select=self.select_cell)
                        self.cells[(r, c)] = cell
                        box.add_widget(cell)
                self.grid_container.add_widget(box)
        self.add_widget(self.grid_container)

        numpad = GridLayout(
            cols=5, rows=2, size_hint=(1, None), height="92dp", spacing=4
        )
        for n in range(1, 10):
            btn = Button(text=str(n), font_size="20sp")
            btn.bind(on_release=lambda inst, num=n: self.input_number(num))
            numpad.add_widget(btn)
        clear_btn = Button(text="Hapus", font_size="13sp")
        clear_btn.bind(on_release=lambda inst: self.clear_cell())
        numpad.add_widget(clear_btn)
        self.add_widget(numpad)

        bottom_bar = BoxLayout(size_hint=(1, None), height="46dp", spacing=8)
        new_game_btn = Button(text="Game Baru")
        new_game_btn.bind(on_release=lambda inst: self.show_difficulty_popup())
        bottom_bar.add_widget(new_game_btn)
        self.add_widget(bottom_bar)

    def _sync_grid_height(self, instance, value):
        instance.height = value

    # -- Game flow --------------------------------------------------------

    def new_game(self, difficulty="medium"):
        self.difficulty = difficulty
        self.solved_board = generate_full_board()
        self.puzzle_board = make_puzzle(self.solved_board, self.difficulty)
        self.given_mask = [
            [self.puzzle_board[r][c] != 0 for c in range(9)] for r in range(9)
        ]
        self.selected_cell = None
        self._refresh_grid()
        self.status_label.text = "Selamat bermain!"
        self._restart_timer()

    # -- Timer ------------------------------------------------------------

    def _restart_timer(self):
        self._stop_timer()
        self.elapsed_seconds = 0
        self._update_timer_label()
        self.timer_event = Clock.schedule_interval(self._tick_timer, 1)

    def _tick_timer(self, dt):
        self.elapsed_seconds += 1
        self._update_timer_label()

    def _update_timer_label(self):
        minutes, seconds = divmod(self.elapsed_seconds, 60)
        self.timer_label.text = f"{minutes:02d}:{seconds:02d}"

    def _stop_timer(self):
        if self.timer_event:
            self.timer_event.cancel()
            self.timer_event = None

    def _refresh_grid(self):
        for r in range(9):
            for c in range(9):
                cell = self.cells[(r, c)]
                cell.set_value(self.puzzle_board[r][c])
                cell.set_state(
                    is_given=self.given_mask[r][c],
                    is_selected=False,
                    is_conflict=False,
                )

    def select_cell(self, row, col):
        if self.given_mask[row][col]:
            return
        if self.selected_cell:
            pr, pc = self.selected_cell
            self.cells[(pr, pc)].set_state(is_selected=False)
        self.selected_cell = (row, col)
        self.cells[(row, col)].set_state(is_selected=True)

    def input_number(self, num):
        if not self.selected_cell:
            self.status_label.text = "Pilih kotak dulu"
            return
        row, col = self.selected_cell
        self.puzzle_board[row][col] = num
        self.cells[(row, col)].set_value(num)
        self._check_conflicts()
        self._check_win()

    def clear_cell(self):
        if not self.selected_cell:
            return
        row, col = self.selected_cell
        self.puzzle_board[row][col] = 0
        self.cells[(row, col)].set_value(0)
        self._check_conflicts()
        self.status_label.text = ""

    def _check_conflicts(self):
        conflicts = get_conflicts(self.puzzle_board)
        for (r, c), cell in self.cells.items():
            cell.set_state(is_conflict=((r, c) in conflicts))

    def _check_win(self):
        if is_board_valid_and_complete(self.puzzle_board):
            self._stop_timer()
            self.status_label.text = f"Selesai dalam {self.timer_label.text}!"
            self.selected_cell = None
        else:
            filled = all(
                self.puzzle_board[r][c] != 0 for r in range(9) for c in range(9)
            )
            self.status_label.text = "Penuh, tapi masih ada yang salah" if filled else ""

    # -- Difficulty popup ---------------------------------------------

    def show_difficulty_popup(self):
        content = BoxLayout(orientation="vertical", spacing=8, padding=8)
        for label, key in [("Mudah", "easy"), ("Sedang", "medium"), ("Sulit", "hard")]:
            btn = Button(text=label)
            btn.bind(on_release=lambda inst, k=key: self._start_new_game(k))
            content.add_widget(btn)
        self.popup = Popup(
            title="Pilih Kesulitan", content=content, size_hint=(0.7, 0.5)
        )
        self.popup.open()

    def _start_new_game(self, difficulty):
        self.popup.dismiss()
        self.new_game(difficulty)


class SudokuApp(App):
    def build(self):
        self.title = "Sudoku"
        # Wrap in an AnchorLayout pinned to the top: SudokuGame now sizes
        # itself to its own content (see minimum_height binding above), so
        # on tall phone screens the leftover space lands below the game
        # instead of as a gap above it.
        root = AnchorLayout(anchor_x="center", anchor_y="top")
        root.add_widget(SudokuGame())
        return root


if __name__ == "__main__":
    SudokuApp().run()
